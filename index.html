<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>611 Logística — Territorios</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b14;--surface:#12141f;--surface2:#1a1c2e;--border:#252840;
  --text:#eeeef5;--text2:#8888aa;
  --accent:#e8304a;       /* rojo 611 */
  --accent2:#4a5fd4;      /* azul 611 */
  --panel:300px;
  --success:#2dce89;--danger:#e8304a;--warn:#fb6340;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

#topbar{display:flex;align-items:center;gap:10px;padding:0 14px;height:50px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:1000}
#topbar h1{font-size:14px;font-weight:600;white-space:nowrap}
#topbar h1 span{color:var(--accent)}
.sep{width:1px;height:22px;background:var(--border);flex-shrink:0}

#search-wrap{flex:1;max-width:400px;position:relative}
#search-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 36px 7px 12px;border-radius:8px;font-size:13px;outline:none;transition:border .15s}
#search-input:focus{border-color:var(--accent)}
#search-input::placeholder{color:var(--text2)}
#search-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);cursor:pointer;font-size:15px}
#search-btn:hover{color:var(--accent)}
#search-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;z-index:9999;overflow:hidden;display:none;max-height:280px;overflow-y:auto}
.sd-item{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border)}
.sd-item:last-child{border-bottom:none}
.sd-item:hover{background:var(--surface2)}
.sd-zone{font-size:11px;color:var(--accent);margin-top:2px}
.sd-day{font-size:11px;color:var(--text2)}
.sd-nozone{font-size:11px;color:var(--text2);font-style:italic}

#day-filter{display:flex;gap:3px}
.day-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:5px 9px;border-radius:6px;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.day-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

#today-btn{background:rgba(232,48,74,.12);border:1px solid rgba(232,48,74,.4);color:var(--accent);padding:5px 11px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap}
#today-btn:hover{background:rgba(232,48,74,.22)}

#main{display:flex;flex:1;overflow:hidden;position:relative}
#map{flex:1;z-index:1}

#panel{width:var(--panel);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#panel-head{padding:12px 14px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
#panel-head h2{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
#stats{display:flex;gap:6px;margin-top:8px}
.stat{flex:1;background:var(--surface2);border-radius:7px;padding:7px 8px;text-align:center}
.stat .sv{font-size:18px;font-weight:700;color:var(--accent)}
.stat .sl{font-size:10px;color:var(--text2);margin-top:1px}

#panel-scroll{overflow-y:auto;flex:1;padding:6px}
#panel-scroll::-webkit-scrollbar{width:3px}
#panel-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.vcard{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:5px;cursor:pointer;transition:border-color .15s}
.vcard:hover,.vcard.active{border-color:var(--accent)}
.vcard .vh{display:flex;align-items:center;gap:7px}
.vdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.vcard .vn{font-size:13px;font-weight:500;flex:1}
.vcard .vc{font-size:11px;color:var(--text2);background:var(--border);padding:2px 6px;border-radius:20px}
.vcard .vtags{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
.vtag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--surface);color:var(--text2);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.vtag:hover,.vtag.on{background:rgba(232,48,74,.12);color:var(--accent);border-color:rgba(232,48,74,.3)}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 16px;border-radius:9px;font-size:12px;z-index:9999;transition:transform .22s;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--success);color:var(--success)}
#toast.err{border-color:var(--danger);color:var(--danger)}

/* Result popup */
.rpop{min-width:200px}
.rpop h3{font-size:13px;font-weight:600;margin-bottom:7px}
.rpop .rr{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.rpop .rl{color:#777}
.rpop .rv{font-weight:500}
.rpop .rb{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;color:#fff;margin-top:5px}
.rpop .rno{font-size:12px;color:#999;font-style:italic}

.leaflet-control-zoom a,.leaflet-bar a{background:var(--surface)!important;color:var(--text)!important;border-color:var(--border)!important}
.leaflet-control-attribution{background:rgba(15,17,23,.7)!important;color:var(--text2)!important}
.leaflet-popup-content-wrapper{border-radius:10px}

#loading{position:fixed;inset:0;background:rgba(15,17,23,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{margin-top:10px;font-size:13px;color:var(--text2)}

#no-data{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:10;opacity:.5}
#no-data p{color:var(--text2);font-size:13px;margin-top:8px}

.day-indicator{position:absolute;top:10px;left:10px;z-index:500;background:var(--surface);border:1px solid var(--border);padding:5px 12px;border-radius:20px;font-size:12px;color:var(--text2)}
.day-indicator span{color:var(--accent);font-weight:600}

/* LOCATION */
#loc-btn{background:rgba(45,206,137,.12);border:1px solid rgba(45,206,137,.35);color:var(--success);padding:5px 11px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap;transition:all .15s}
#loc-btn:hover{background:rgba(45,206,137,.22)}
#loc-btn.locating{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* LOCATION CARD */
#loc-card{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 18px;z-index:2000;min-width:280px;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.4);display:none}
#loc-card.show{display:block}
#loc-card .lc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
#loc-card .lc-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
#loc-card .lc-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:0;line-height:1}
#loc-card .lc-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:5px}
#loc-card .lc-label{color:var(--text2)}
#loc-card .lc-value{font-weight:600;color:var(--text)}
#loc-card .lc-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;color:#fff;margin:8px 0 10px}
#loc-card .lc-warn{color:var(--warn);font-size:12px;margin-bottom:8px}
#loc-card .lc-coords{font-size:10px;color:var(--text2);font-family:monospace;margin-bottom:10px}
#loc-card .lc-actions{display:flex;gap:8px}
#loc-card .lc-actions button{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s}
#loc-card .lc-actions button:hover{opacity:.85}
.btn-wapp{background:#25D366;color:#fff}
.btn-center{background:var(--surface2);color:var(--text);border:1px solid var(--border)!important;border:none}

/* ── 611 LOGÍSTICA BRANDING ─────────────────────────────────────────────── */
#nav-logo{
  width:34px;height:34px;border-radius:8px;
  object-fit:cover;flex-shrink:0;
}

/* Topbar gradient */
#topbar{
  background:linear-gradient(135deg,#0e0f1c 0%,#16172a 100%);
  border-bottom:1px solid rgba(232,48,74,.25);
}

/* Watermark logo */
#map::after{
  content:'';
  position:absolute;
  bottom:40px;right:16px;
  width:90px;height:90px;
  background:url("logo.jpg") center/contain no-repeat;
  opacity:.07;
  pointer-events:none;
  z-index:400;
}

/* Accent glow on active elements */
.day-btn.active{
  background:linear-gradient(135deg,var(--accent),#c0273d);
  border-color:var(--accent);
  box-shadow:0 2px 8px rgba(232,48,74,.35);
}
#today-btn{
  background:rgba(232,48,74,.12);
  border-color:rgba(232,48,74,.4);
  color:var(--accent);
}
#today-btn:hover{background:rgba(232,48,74,.22)}

/* Panel header accent line */
#panel-head{border-bottom:1px solid rgba(232,48,74,.2)}
#panel-head h2{color:var(--accent);letter-spacing:.1em}

/* Stats accent */
.stat .sv{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

/* Vendor dot glow */
.vcard.active{
  border-color:var(--accent);
  box-shadow:0 0 0 1px rgba(232,48,74,.2);
}

/* Panel FAB */
#panel-fab{
  background:linear-gradient(135deg,var(--accent),#c0273d);
  box-shadow:0 4px 16px rgba(232,48,74,.45);
}

/* loc-btn */
#loc-btn{
  background:rgba(45,206,137,.1);
  border-color:rgba(45,206,137,.35);
}

/* Loading spinner accent */
.spinner{border-top-color:var(--accent)}

/* Scrollbar accent */
#panel-scroll::-webkit-scrollbar-thumb{background:rgba(232,48,74,.3)}

/* Day indicator */
.day-indicator{
  background:rgba(10,11,20,.85);
  border-color:rgba(232,48,74,.25);
  backdrop-filter:blur(4px);
}
.day-indicator span{color:var(--accent)}

/* Search focus */
#search-input:focus{border-color:var(--accent)}

/* vtag active */
.vtag.on{
  background:rgba(232,48,74,.15);
  color:var(--accent);
  border-color:rgba(232,48,74,.3);
}

/* Popup badge uses vendor color already, keep as-is */

/* Mobile panel handle */
@media(max-width:768px){
  #panel-head::before{background:rgba(232,48,74,.35)}
  #nav-logo{width:30px;height:30px}
}



/* ── CLUSTER STYLES ──────────────────────────────────────────────────────── */
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:none!important}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:none!important}
.custom-cluster{
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;font-weight:700;color:#fff;
  border:2px solid rgba(255,255,255,.6);
  box-shadow:0 2px 8px rgba(0,0,0,.4);
  font-size:11px;
}
/* ── MOBILE RESPONSIVE ─────────────────────────────────────────────────── */
@media(max-width:768px){

  /* Topbar compacto */
  #topbar{
    flex-wrap:wrap;height:auto;
    padding:8px 10px;gap:6px;
  }
  #topbar h1{font-size:13px}
  #nav-logo{width:28px;height:28px}
  .sep{display:none}

  /* Búsqueda full width arriba */
  #search-wrap{order:-1;flex-basis:100%;max-width:100%}
  #search-input{font-size:16px;padding:11px 38px 11px 14px;border-radius:10px}
  #search-drop{max-height:45vh;border-radius:10px}
  .sd-item{padding:14px 14px}

  /* Fila de botones: scroll horizontal */
  #today-btn,#loc-btn{padding:7px 12px;font-size:12px;border-radius:8px}
  #day-filter{flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
  #day-filter::-webkit-scrollbar{display:none}
  .day-btn{padding:7px 12px;font-size:12px;min-width:48px;text-align:center;border-radius:8px}

  /* Mapa ocupa todo */
  #map{width:100%;position:relative}

  /* ── PANEL COMO DRAWER DESDE ABAJO ── */
  #panel{
    position:fixed;
    left:0;right:0;bottom:0;
    width:100%!important;
    height:70vh;
    max-height:70vh;
    border-left:none;
    border-top:2px solid rgba(232,48,74,.3);
    border-radius:20px 20px 0 0;
    transform:translateY(100%);
    transition:transform .3s cubic-bezier(.4,0,.2,1);
    z-index:2000;
    box-shadow:0 -8px 32px rgba(0,0,0,.5);
  }
  #panel.open{transform:translateY(0)}

  /* Handle visual arriba del drawer */
  #panel-head{padding:6px 14px 10px}
  #panel-head::before{
    content:'';display:block;
    width:40px;height:4px;
    background:rgba(232,48,74,.4);
    border-radius:2px;
    margin:0 auto 12px;
  }

  /* Panel scroll altura correcta */
  #panel-scroll{
    max-height:calc(70vh - 130px);
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }

  /* Vendor cards más grandes para tocar */
  .vcard{padding:12px 14px;margin-bottom:6px}
  .vcard .vn{font-size:14px}
  .vcard .vc{font-size:12px}
  .vtag{padding:4px 10px;font-size:11px}

  /* Stats más grandes */
  .stat .sv{font-size:20px}
  .stat .sl{font-size:11px}

  /* Botón flotante para abrir panel */
  #panel-fab{
    display:flex!important;
    position:fixed;
    bottom:24px;right:16px;
    width:52px;height:52px;
    background:linear-gradient(135deg,var(--accent),#c0273d);
    border:none;border-radius:50%;
    color:#fff;font-size:22px;
    align-items:center;justify-content:center;
    cursor:pointer;z-index:1900;
    box-shadow:0 4px 20px rgba(232,48,74,.5);
    transition:transform .15s,box-shadow .15s;
  }
  #panel-fab:active{transform:scale(.9);box-shadow:0 2px 10px rgba(232,48,74,.4)}

  /* Backdrop oscuro detrás del drawer */
  #panel-backdrop{
    display:none;
    position:fixed;inset:0;
    background:rgba(0,0,0,.55);
    z-index:1999;
    backdrop-filter:blur(2px);
  }
  #panel-backdrop.show{display:block}

  /* Location card full width */
  #loc-card{
    left:10px;right:10px;bottom:10px;
    transform:none;
    min-width:unset;max-width:unset;
    border-radius:16px;
    padding:16px;
  }
  #loc-card .lc-actions button{padding:13px;font-size:13px;border-radius:10px}

  /* Zoom controls más grandes */
  .leaflet-control-zoom a{
    width:40px!important;height:40px!important;
    line-height:40px!important;font-size:20px!important;
  }

  /* Hint centrado */
  #vendor-hint > div{padding:24px 32px}

  /* Popup ancho */
  .leaflet-popup-content-wrapper{max-width:88vw}

  /* Day indicator */
  .day-indicator{font-size:11px;padding:4px 10px;top:8px;left:8px}
}

/* FAB oculto en desktop */
#panel-fab{display:none}
#panel-backdrop{display:none}

</style>
</head>
<body>

<div id="topbar">
  <img id="nav-logo" src="logo.jpg" alt="611 Logística"/><h1>611 <span>Logística</span></h1>
  <div class="sep"></div>

  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="Buscar cliente o dirección..."/>
    <button id="search-btn">🔍</button>
    <div id="search-drop"></div>
  </div>

  <div class="sep"></div>

  <button id="today-btn">Hoy</button>
  <button id="loc-btn">📍 Mi ubicación</button>

  <div id="day-filter">
    <button class="day-btn active" data-day="all">Todos</button>
    <button class="day-btn" data-day="Lunes">Lun</button>
    <button class="day-btn" data-day="Martes">Mar</button>
    <button class="day-btn" data-day="Miércoles">Mié</button>
    <button class="day-btn" data-day="Jueves">Jue</button>
    <button class="day-btn" data-day="Viernes">Vie</button>
    <button class="day-btn" data-day="Sábado">Sáb</button>
  </div>
</div>

<button id="panel-fab" title="Ver vendedores">☰</button>
<div id="panel-backdrop"></div>
<div id="main">
  <div id="map">
    <div id="no-data">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <p>Cargando datos...</p>
    </div>
    <div id="vendor-hint" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:10">
      <div style="background:rgba(18,20,31,.85);border:1px solid rgba(232,48,74,.25);border-radius:14px;padding:20px 28px;backdrop-filter:blur(8px)">
        <div style="font-size:28px;margin-bottom:8px">☰</div>
        <div style="font-size:14px;font-weight:600;color:#eeeef5;margin-bottom:4px">Seleccioná un vendedor</div>
        <div style="font-size:12px;color:#8888aa">para ver sus puntos de visita</div>
      </div>
    </div>
    <div class="day-indicator" id="day-indicator" style="display:none">Mostrando: <span id="day-ind-text">Todos</span></div>
  </div>

  <div id="panel">
    <div id="panel-head">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <h2 style="margin:0">Vendedores</h2>
        <div style="display:flex;gap:5px">
          <button id="btn-sel-all" style="background:rgba(232,48,74,.12);border:1px solid rgba(232,48,74,.3);color:var(--accent);padding:3px 9px;border-radius:5px;font-size:11px;cursor:pointer">Todos</button>
          <button id="btn-sel-none" style="background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:3px 9px;border-radius:5px;font-size:11px;cursor:pointer">Ninguno</button>
        </div>
      </div>
      <div id="stats">
        <div class="stat"><div class="sv" id="s-pts">—</div><div class="sl">Clientes</div></div>
        <div class="stat"><div class="sv" id="s-vend">—</div><div class="sl">Vendedores</div></div>
        <div class="stat"><div class="sv" id="s-zones">—</div><div class="sl">Zonas</div></div>
      </div>
    </div>
    <div id="panel-scroll"><div id="vendor-list"></div></div>
  </div>
</div>

<div id="toast"></div>
<div id="loading"><div class="spinner"></div><p>Cargando territorios...</p></div>

<!-- LOCATION CARD -->
<div id="loc-card">
  <div class="lc-head">
    <div class="lc-title">📍 Tu ubicación actual</div>
    <button class="lc-close" id="loc-card-close">✕</button>
  </div>
  <div id="lc-body"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
<script>
const DAYS_NUM = {0:'Domingo',1:'Lunes',2:'Martes',3:'Miércoles',4:'Jueves',5:'Viernes',6:'Sábado'};

let allPoints=[], zones=[], vendors={}, vendorColors={}, currentDay='all', activeVendors=new Set();
let map, markerLayer, zoneLayer;

// ── INIT ──────────────────────────────────────────────────────────────────────
function initMap(){
  map = L.map('map',{center:[-34.6037,-58.3816],zoom:11});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19
  }).addTo(map);
  zoneLayer = L.layerGroup().addTo(map);
  markerLayer = L.markerClusterGroup({
    maxClusterRadius: 40,
    disableClusteringAtZoom: 16,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    iconCreateFunction: function(cluster){
      const count = cluster.getChildCount();
      // get dominant vendor color in cluster
      const markers = cluster.getAllChildMarkers();
      const colorCounts = {};
      markers.forEach(m=>{ const c=m._vendorColor||'#888'; colorCounts[c]=(colorCounts[c]||0)+1; });
      const dominantColor = Object.entries(colorCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]||'#e8304a';
      const size = count < 10 ? 28 : count < 50 ? 34 : count < 200 ? 40 : 46;
      return L.divIcon({
        html: `<div class="custom-cluster" style="width:${size}px;height:${size}px;background:${dominantColor};font-size:${size<34?10:12}px">${count}</div>`,
        className:'',iconSize:[size,size],iconAnchor:[size/2,size/2]
      });
    }
  }).addTo(map);
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadData(){
  return new Promise(async (resolve)=>{
  try{
    const [ptRes, zRes] = await Promise.all([
      fetch('puntos.json'),
      fetch('zonas.json')
    ]);
    if(!ptRes.ok) throw new Error('puntos.json no encontrado');
    const pts  = await ptRes.json();
    const zns  = zRes.ok ? await zRes.json() : [];
    processData(pts, zns);
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('no-data').querySelector('p').textContent='Error cargando datos: '+e.message;
    resolve();
    showToast('Error: '+e.message, false);
    resolve();
  }
  });
}

function processData(pts, zns){
  const colorList=['#4f8ef7','#f7614f','#4fc78e','#c74fa8','#f7c14f','#4fc7c7',
    '#c7884f','#884fc7','#c74f4f','#4f8fc7','#7dc74f','#c7c74f','#4f4fc7',
    '#c74f8f','#f78f4f','#4fc7a8','#8f4fc7','#4fc762','#e6a817','#17b8e6'];
  let ci=0;
  const vm={};
  pts.forEach(p=>{
    const vid=String(p.vendedor_id||p.vendedorId||'').trim();
    const vn =String(p.vendedor_nombre||p.vendedorNombre||vid).trim();
    if(!vm[vid]){ vm[vid]={id:vid,name:vn,count:0,days:new Set()}; vendorColors[vid]=colorList[ci++%colorList.length]; }
    vm[vid].count++;
    if(p.dia) vm[vid].days.add(p.dia);
  });
  vendors=vm; allPoints=pts; zones=zns;

  document.getElementById('s-pts').textContent=pts.length.toLocaleString('es-AR');
  document.getElementById('s-vend').textContent=Object.keys(vm).length;
  document.getElementById('s-zones').textContent=zns.length;

  renderZones();
  // Markers load only when vendor is selected
  renderVendorList();

  if(pts.length){
    const lats=pts.map(p=>p.lat), lngs=pts.map(p=>p.lng);
    map.fitBounds([[Math.min(...lats),Math.min(...lngs)],[Math.max(...lats),Math.max(...lngs)]],{padding:[30,30]});
  }
  document.getElementById('loading').style.display='none';
  document.getElementById('no-data').style.display='none';
  document.getElementById('vendor-hint').style.display='block';
  resolve();
  document.getElementById('day-indicator').style.display='block';
}

// ── ZONES ─────────────────────────────────────────────────────────────────────
function renderZones(){
  zoneLayer.clearLayers();
  zones.forEach(z=>{
    if(currentDay!=='all' && z.dia && z.dia!==currentDay) return;
    if(activeVendors.size>0 && !activeVendors.has(z.vendedor_id)) return;
    const color = vendorColors[z.vendedor_id]||'#4f8ef7';
    try{
      const layer = L.geoJSON(z.geojson,{
        style:{color,fillColor:color,weight:2,opacity:.85,fillOpacity:.15,dashArray:currentDay==='all'?'4':''}
      });
      layer.bindPopup(`
        <div class="rpop">
          <h3>${z.nombre||z.vendedor_nombre}</h3>
          <div class="rr"><span class="rl">Vendedor</span><span class="rv">${z.vendedor_nombre}</span></div>
          <div class="rr"><span class="rl">Día</span><span class="rv">${z.dia||'—'}</span></div>
          <span class="rb" style="background:${color}">${z.dia||'Zona'}</span>
        </div>
      `);
      layer.addTo(zoneLayer);
    }catch(e){}
  });
}

// ── MARKERS ───────────────────────────────────────────────────────────────────

// ── SHAPES PER VENDOR ─────────────────────────────────────────────────────────
const SHAPES = [
  // circle
  (c,s) => `<div style="width:${s}px;height:${s}px;border-radius:50%;background:${c};border:2px solid rgba(255,255,255,.7);box-shadow:0 0 5px ${c}bb"></div>`,
  // square
  (c,s) => `<div style="width:${s}px;height:${s}px;border-radius:2px;background:${c};border:2px solid rgba(255,255,255,.7);box-shadow:0 0 5px ${c}bb"></div>`,
  // triangle up
  (c,s) => `<div style="width:0;height:0;border-left:${s/2}px solid transparent;border-right:${s/2}px solid transparent;border-bottom:${s}px solid ${c};filter:drop-shadow(0 0 3px ${c}bb)"></div>`,
  // diamond
  (c,s) => `<div style="width:${s*.75}px;height:${s*.75}px;background:${c};transform:rotate(45deg);border:2px solid rgba(255,255,255,.7);box-shadow:0 0 5px ${c}bb"></div>`,
  // star
  (c,s) => `<div style="position:relative;width:${s}px;height:${s}px">
    <div style="position:absolute;inset:0;background:${c};clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);filter:drop-shadow(0 0 3px ${c}bb)"></div></div>`,
  // pentagon
  (c,s) => `<div style="position:relative;width:${s}px;height:${s}px">
    <div style="position:absolute;inset:0;background:${c};clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);filter:drop-shadow(0 0 3px ${c}bb)"></div></div>`,
  // hexagon
  (c,s) => `<div style="position:relative;width:${s}px;height:${s}px">
    <div style="position:absolute;inset:0;background:${c};clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);filter:drop-shadow(0 0 3px ${c}bb)"></div></div>`,
  // cross/plus
  (c,s) => `<div style="position:relative;width:${s}px;height:${s}px">
    <div style="position:absolute;inset:0;background:${c};clip-path:polygon(33% 0%,67% 0%,67% 33%,100% 33%,100% 67%,67% 67%,67% 100%,33% 100%,33% 67%,0% 67%,0% 33%,33% 33%);filter:drop-shadow(0 0 3px ${c}bb)"></div></div>`,
  // triangle down
  (c,s) => `<div style="width:0;height:0;border-left:${s/2}px solid transparent;border-right:${s/2}px solid transparent;border-top:${s}px solid ${c};filter:drop-shadow(0 0 3px ${c}bb)"></div>`,
  // rounded square
  (c,s) => `<div style="width:${s}px;height:${s}px;border-radius:4px;background:${c};border:2px solid rgba(255,255,255,.7);box-shadow:0 0 5px ${c}bb;transform:rotate(10deg)"></div>`,
];

let vendorShapeIndex = {};

function getVendorShape(vid){
  if(vendorShapeIndex[vid] === undefined){
    const keys = Object.keys(vendorShapeIndex);
    vendorShapeIndex[vid] = keys.length % SHAPES.length;
  }
  return vendorShapeIndex[vid];
}

function makeIcon(vid, color){
  const isMob = window.innerWidth <= 768;
  const size = isMob ? 14 : 11;  // bigger on mobile for touch
  const anchor = size / 2;
  const shapeIdx = getVendorShape(vid);
  const shapeFn = SHAPES[shapeIdx];
  // touch target wrapper (transparent, bigger area)
  const touchSize = isMob ? 30 : 18;
  const touchAnchor = touchSize / 2;
  return L.divIcon({
    className: '',
    html: `<div style="width:${touchSize}px;height:${touchSize}px;display:flex;align-items:center;justify-content:center">
      ${shapeFn(color, size)}
    </div>`,
    iconSize: [touchSize, touchSize],
    iconAnchor: [touchAnchor, touchAnchor],
    popupAnchor: [0, -touchAnchor]
  });
}

function renderMarkers(pts){
  markerLayer.clearLayers();
  const bulk=[];
  pts.forEach(p=>{
    if(currentDay!=='all' && p.dia && p.dia!==currentDay) return;
    if(activeVendors.size>0 && !activeVendors.has(String(p.vendedor_id||p.vendedorId))) return;
    const vid=String(p.vendedor_id||p.vendedorId||'');
    const color=vendorColors[vid]||'#aaa';
    const icon=makeIcon(vid, color);
    const m=L.marker([p.lat,p.lng],{icon});
    const cname=p.cliente_nombre||p.clienteNombre||p.cliente||'';
    const cid=p.cliente_id||p.clienteId||'';
    const shapeIdx=getVendorShape(vid);
    const shapeNames=['●','■','▲','◆','★','⬠','⬡','✛','▼','▪'];
    const shapeName=shapeNames[shapeIdx]||'●';
    const wappPunto = encodeURIComponent(
      `⚠️ *Cliente no atendido*
`+
      (cid?`N° Cliente: ${cid}
`:'')+
      (cname?`Nombre: ${cname}
`:'')+
      `Vendedor asignado: ${p.vendedor_nombre||vid}
`+
      `Día de visita: ${p.dia||'—'}
`+
      `Maps: https://maps.google.com/?q=${p.lat},${p.lng}`
    );
    m.bindPopup(`
      <div style="min-width:200px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:18px;color:${color}">${shapeName}</span>
          <div>
            <p style="font-weight:700;font-size:13px;line-height:1.2">${cname||cid}</p>
            ${cid?`<p style="font-size:10px;color:#888">N° ${cid}</p>`:''}
          </div>
        </div>
        <div style="background:#f5f5f5;border-radius:8px;padding:7px 10px;margin-bottom:8px">
          <p style="font-size:12px;font-weight:600;color:#333">👤 ${p.vendedor_nombre||vid}</p>
          ${p.dia?`<p style="font-size:12px;color:#555;margin-top:3px">📅 ${p.dia}</p>`:''}
        </div>
        <a href="https://wa.me/?text=${wappPunto}" target="_blank"
          style="display:block;text-align:center;background:#25D366;color:#fff;padding:8px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none">
          ⚠️ No atendido — Compartir
        </a>
      </div>
    `,{maxWidth:240});
    m._vendorColor = color;
    bulk.push(m);
  });
  markerLayer.addLayers(bulk);
}

// ── VENDOR LIST ───────────────────────────────────────────────────────────────
function renderVendorList(){
  const el=document.getElementById('vendor-list');
  const sorted=Object.values(vendors).sort((a,b)=>b.count-a.count);
  el.innerHTML=sorted.map(v=>{
    const color=vendorColors[v.id]||'#aaa';
    const days=[...v.days].sort();
    const shapeIdx=getVendorShape(v.id);
    const shapeNames=['●','■','▲','◆','★','⬠','⬡','✛','▼','▪'];
    const shape=shapeNames[shapeIdx]||'●';
    return `<div class="vcard${activeVendors.has(v.id)?' active':''}" data-vid="${v.id}">
      <div class="vh">
        <span style="font-size:14px;color:${color};flex-shrink:0;width:18px;text-align:center">${shape}</span>
        <div class="vn">${v.name}</div>
        <div class="vc">${v.count.toLocaleString('es-AR')}</div>
      </div>
      ${days.length?`<div class="vtags">${days.map(d=>`<span class="vtag${(currentDay==='all'||d===currentDay)?' on':''}" data-day="${d}">${d}</span>`).join('')}</div>`:''}
    </div>`;
  }).join('');

  el.querySelectorAll('.vcard').forEach(c=>{
    c.onclick=e=>{
      if(e.target.classList.contains('vtag')) return;
      const vid=c.dataset.vid;
      if(activeVendors.has(vid)) activeVendors.delete(vid);
      else { activeVendors.add(vid); _origVcardClick(vid); }
      renderVendorList(); renderZones();
      if(activeVendors.size>0){
        document.getElementById('vendor-hint').style.display='none';
        renderMarkers(allPoints);
        // zoom to fit all selected vendors
        const vpts=allPoints.filter(p=>activeVendors.has(String(p.vendedor_id))&&(currentDay==='all'||!p.dia||p.dia===currentDay));
        if(vpts.length){
          const lats=vpts.map(p=>p.lat),lngs=vpts.map(p=>p.lng);
          map.fitBounds([[Math.min(...lats),Math.min(...lngs)],[Math.max(...lats),Math.max(...lngs)]],{padding:[40,40],maxZoom:14});
        }
      } else {
        markerLayer.clearLayers();
        document.getElementById('vendor-hint').style.display='block';
      }
    };
  });
  el.querySelectorAll('.vtag').forEach(t=>{
    t.onclick=e=>{ e.stopPropagation(); setDay(t.dataset.day); };
  });
}

// ── SELECT ALL / NONE ────────────────────────────────────────────────────────
document.addEventListener('click', e=>{

// ── SEARCH ────────────────────────────────────────────────────────────────────
let debounce;
document.getElementById('search-input').oninput=()=>{clearTimeout(debounce);debounce=setTimeout(doSearch,320)};
document.getElementById('search-input').onkeydown=e=>{if(e.key==='Enter')doSearch()};
document.getElementById('search-btn').onclick=doSearch;
document.addEventListener('click',e=>{if(!e.target.closest('#search-wrap'))document.getElementById('search-drop').style.display='none'});

function parseCoords(q){
  // Accept: "-31.4123, -64.1892" or "-31.4123 -64.1892" or "-31.4123,-64.1892"
  const m=q.match(/^\s*(-?\d+\.\d+)[\s,]+(-?\d+\.\d+)\s*$/);
  if(!m)return null;
  const a=+m[1],b=+m[2];
  // lat range -90..90, lng range -180..180
  if(a>=-90&&a<=90&&b>=-180&&b<=180)return{lat:a,lng:b};
  if(b>=-90&&b<=90&&a>=-180&&a<=180)return{lat:b,lng:a};
  return null;
}

function doSearch(){
  const q=document.getElementById('search-input').value.trim();
  if(!q){document.getElementById('search-drop').style.display='none';return;}

  // 1. Try coords paste first
  const coords=parseCoords(q);
  if(coords){showCoordResult(coords.lat,coords.lng,q);return;}

  // 2. Client name/id match
  const matches=allPoints.filter(p=>{
    const s=q.toLowerCase();
    return String(p.cliente_nombre||p.clienteNombre||'').toLowerCase().includes(s)||
           String(p.cliente_id||p.clienteId||'').toLowerCase().includes(s);
  }).slice(0,6);
  if(matches.length){showClientDrop(matches);return;}

  // 3. Address geocode
  geocode(q);
}

function showCoordResult(lat,lng,label){
  const dr=document.getElementById('search-drop');
  const zone=findZone(lat,lng);
  const v=zone&&zone.vendedor_id?vendors[zone.vendedor_id]:null;
  const nearest=!zone?findNearest(lat,lng):null;
  dr.innerHTML=`<div class="sd-item" data-lat="${lat}" data-lng="${lng}" data-name="${label}">
    <div style="font-size:12px;font-family:monospace">${lat.toFixed(5)}, ${lng.toFixed(5)}</div>
    ${zone?`<div class="sd-zone">📍 ${zone.nombre||zone.vendedor_nombre}${v?' · '+v.name:''}</div>
            ${zone.dia?`<div class="sd-day">📅 ${zone.dia}</div>`:''}`
    :nearest?`<div class="sd-zone" style="color:#fb6340">⚠️ Sin zona · más cercano: <b>${nearest.vendedor_nombre}</b></div>
              <div class="sd-day">📅 ${nearest.dia||'—'} · a ${nearest.distKm} km</div>`
    :`<div class="sd-nozone">Sin zona y sin datos cargados</div>`}
  </div>`;
  dr.style.display='block';
  dr.querySelector('.sd-item').onclick=()=>{
    map.setView([lat,lng],17);
    showNearbyPoints(lat,lng);
    const zone2=findZone(lat,lng);
    const v2=zone2&&zone2.vendedor_id?vendors[zone2.vendedor_id]:null;
    const color=zone2?vendorColors[zone2.vendedor_id]||'#4f8ef7':'#fb6340';
    const nr=!zone2?findNearest(lat,lng):null;
    L.popup().setLatLng([lat,lng]).setContent(`
      <div class="rpop">
        <h3 style="font-family:monospace;font-size:12px">${lat.toFixed(5)}, ${lng.toFixed(5)}</h3>
        ${zone2?`
          <div class="rr"><span class="rl">Zona</span><span class="rv">${zone2.nombre||'—'}</span></div>
          <div class="rr"><span class="rl">Vendedor</span><span class="rv">${zone2.vendedor_nombre||'—'}</span></div>
          <div class="rr"><span class="rl">Día</span><span class="rv">${zone2.dia||'—'}</span></div>
          <span class="rb" style="background:${color}">${zone2.dia||'Zona'}</span>
        `:nr?`
          <div class="rr" style="color:#fb6340"><span class="rl">⚠️ Sin zona</span></div>
          <div class="rr"><span class="rl">Vendedor más cercano</span><span class="rv" style="color:#fb6340">${nr.vendedor_nombre}</span></div>
          <div class="rr"><span class="rl">Días de visita</span><span class="rv">${nr.dia||'—'}</span></div>
          <div class="rr"><span class="rl">Distancia</span><span class="rv">${nr.distKm} km</span></div>
          <span class="rb" style="background:#fb6340">Zona no definida</span>
        `:`<p class="rno">Sin datos de vendedores cargados.</p>`}
      </div>
    `).openOn(map);
    dr.style.display='none';
  };
}

function showClientDrop(pts){
  const dr=document.getElementById('search-drop');
  dr.innerHTML=pts.map(p=>{
    const cname=p.cliente_nombre||p.clienteNombre||p.cliente_id||p.clienteId||'';
    const vname=p.vendedor_nombre||p.vendedorNombre||'';
    return `<div class="sd-item" data-lat="${p.lat}" data-lng="${p.lng}">
      <div>${cname}</div>
      <div class="sd-zone">👤 ${vname}</div>
      ${p.dia?`<div class="sd-day">📅 ${p.dia}</div>`:''}

  dr.querySelectorAll('.sd-item').forEach(i=>{
    i.onclick=()=>{map.setView([+i.dataset.lat,+i.dataset.lng],17);dr.style.display='none'};

async function geocode(q){
  const dr=document.getElementById('search-drop');
  dr.innerHTML='<div class="sd-item">Buscando...</div>';
  dr.style.display='block';
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q+', Córdoba, Argentina')}&limit=5&countrycodes=ar&viewbox=-66.3,-35.7,-61.7,-28.9&bounded=0`,
      {headers:{'Accept-Language':'es'}});
    const data=await r.json();
    if(!data.length){dr.innerHTML='<div class="sd-item sd-nozone">No se encontró la dirección</div>';return;}
    dr.innerHTML=data.map(d=>{
      const lat=+d.lat,lng=+d.lon;

        const dia_=(zone?zone.dia:nr?nr.dia:'—');
        const zona_=(zone?zone.nombre:'Sin zona');
        const wapp_=encodeURIComponent(`📍 *${i.dataset.name}*
Zona: ${zona_}
Vendedor: ${vendedor_}
Día de visita: ${dia_}
Maps: https://maps.google.com/?q=${lat},${lng}`);
        L.popup().setLatLng([lat,lng]).setContent(`
          <div class="rpop">
            <h3 style="font-size:12px">${i.dataset.name}</h3>
            ${zone?`
              <div class="rr"><span class="rl">Zona</span><span class="rv">${zone.nombre||'—'}</span></div>
              <div class="rr"><span class="rl">Vendedor</span><span class="rv">${zone.vendedor_nombre||'—'}</span></div>

            `:nr?`
              <div class="rr"><span class="rl" style="color:#fb6340">⚠️ Sin zona</span></div>
              <div class="rr"><span class="rl">Vendedor más cercano</span><span class="rv" style="color:#fb6340">${nr.vendedor_nombre}</span></div>
              <div class="rr"><span class="rl">Día de visita</span><span class="rv">${nr.dia||'—'}</span></div>
              <div class="rr"><span class="rl">Distancia</span><span class="rv">${nr.distKm} km</span></div>
              <span class="rb" style="background:#fb6340">Zona no definida</span>
            `:`<p class="rno">Sin datos cargados.</p>`}
            <a href="https://wa.me/?text=${wapp_}" target="_blank"
              style="display:block;text-align:center;background:#25D366;color:#fff;padding:8px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;margin-top:10px">
              Compartir por WhatsApp 📤
            </a>
          </div>
        `).openOn(map);
        dr.style.display='none';
      };
    });
  }catch(e){dr.innerHTML='<div class="sd-item" style="color:#f5365c">Error de conexión</div>';}
}

function findZone(lat,lng){
  const pt=turf.point([lng,lat]);
  const ordered=[...zones].sort((a,b)=>{
    if(currentDay==='all') return 0;
    return (a.dia===currentDay?-1:1)-(b.dia===currentDay?-1:1);
  });
  for(const z of ordered){
    try{if(turf.booleanPointInPolygon(pt,turf.feature(z.geojson.geometry)))return z;}catch(e){}
  }
  return null;
}

function findNearest(lat,lng){
  if(!allPoints.length) return null;
  // Use all points regardless of day filter for nearest search
  // but prefer current day if active
  const pool = allPoints;
  if(!pool.length) return null;

  // Find top 20 nearest, then pick best by day preference
  const scored = pool.map(p=>{
    const dlat=p.lat-lat, dlng=p.lng-lng;
    return {p, d: dlat*dlat + dlng*dlng};
  }).sort((a,b)=>a.d-b.d).slice(0,20);

  // Prefer current day match if filter active
  let best = null;
  if(currentDay!=='all'){
    best = scored.find(s=>s.p.dia===currentDay);
  }
  if(!best) best = scored[0];
  if(!best) return null;

  const distKm = Math.round(Math.sqrt(best.d)*111*10)/10;
  return {
    vendedor_id: best.p.vendedor_id,
    vendedor_nombre: best.p.vendedor_nombre,
    dia: best.p.dia||'—',
    distKm,
    cliente_cercano: best.p.cliente_nombre||best.p.cliente_id
  };
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let tt;
function showToast(msg,ok=true){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='show '+(ok?'ok':'err');
  clearTimeout(tt);tt=setTimeout(()=>el.className='',3000);

// ── GEOLOCATION ───────────────────────────────────────────────────────────────
let locMarker=null, locWatchId=null;

document.getElementById('loc-btn').onclick=requestLocation;
document.getElementById('loc-card-close').onclick=()=>{
  document.getElementById('loc-card').classList.remove('show');
  if(locWatchId){navigator.geolocation.clearWatch(locWatchId);locWatchId=null;}
  if(locMarker){map.removeLayer(locMarker);locMarker=null;}
  document.getElementById('loc-btn').textContent='📍 Mi ubicación';
  document.getElementById('loc-btn').classList.remove('locating');
};

function requestLocation(){
  if(!navigator.geolocation){showToast('Tu navegador no soporta geolocalización',false);return;}
  const btn=document.getElementById('loc-btn');
  btn.textContent='📍 Localizando...';
  btn.classList.add('locating');
  navigator.geolocation.getCurrentPosition(onLocation, onLocError, {enableHighAccuracy:true,timeout:15000});
}

function onLocError(e){
  const btn=document.getElementById('loc-btn');
  btn.textContent='📍 Mi ubicación';
  btn.classList.remove('locating');
  const msgs={1:'Permiso de ubicación denegado',2:'Ubicación no disponible',3:'Tiempo de espera agotado'};
  showToast(msgs[e.code]||'Error de ubicación',false);
}

function onLocation(pos){
  const lat=pos.coords.latitude, lng=pos.coords.longitude;
  const acc=Math.round(pos.coords.accuracy);

  const btn=document.getElementById('loc-btn');
  btn.textContent='📍 Ubicado';
  btn.classList.remove('locating');

  // Marker pulsante
  if(locMarker) map.removeLayer(locMarker);
  const icon=L.divIcon({className:'',
    html:`<div style="position:relative;width:16px;height:16px">
      <div style="position:absolute;inset:0;border-radius:50%;background:var(--success);opacity:.3;animation:pulse 1.5s infinite"></div>
      <div style="position:absolute;inset:3px;border-radius:50%;background:var(--success);border:2px solid #fff;box-shadow:0 0 6px rgba(45,206,137,.6)"></div>
    </div>`,
    iconSize:[16,16],iconAnchor:[8,8]});
  locMarker=L.marker([lat,lng],{icon,zIndexOffset:1000}).addTo(map);
  map.setView([lat,lng],16);
  showNearbyPoints(lat,lng);

  // Find zone or nearest
  const zone=findZone(lat,lng);
  const v=zone&&zone.vendedor_id?vendors[zone.vendedor_id]:null;
  const nr=!zone?findNearest(lat,lng):null;
  const color=zone?vendorColors[zone.vendedor_id]||'#4f8ef7':nr?'#fb6340':'#888';

  // Build card content
  let body='';
  body+=`<div class="lc-coords">${lat.toFixed(6)}, ${lng.toFixed(6)} · precisión ±${acc}m</div>`;

  if(zone){
    body+=`<div class="lc-row"><span class="lc-label">Zona</span><span class="lc-value">${zone.nombre||'—'}</span></div>`;
    body+=`<div class="lc-row"><span class="lc-label">Vendedor</span><span class="lc-value">${zone.vendedor_nombre||'—'}</span></div>`;
    body+=`<div class="lc-row"><span class="lc-label">Día de visita</span><span class="lc-value">${zone.dia||'—'}</span></div>`;
    body+=`<span class="lc-badge" style="background:${color}">${zone.dia||'Zona'}</span>`;
  } else if(nr){
    body+=`<div class="lc-warn">⚠️ Sin zona definida en esta ubicación</div>`;
    body+=`<div class="lc-row"><span class="lc-label">Vendedor más cercano</span><span class="lc-value" style="color:#fb6340">${nr.vendedor_nombre}</span></div>`;
    body+=`<div class="lc-row"><span class="lc-label">Día de visita</span><span class="lc-value">${nr.dia||'—'}</span></div>`;
    body+=`<div class="lc-row"><span class="lc-label">Distancia</span><span class="lc-value">${nr.distKm} km</span></div>`;
    body+=`<span class="lc-badge" style="background:#fb6340">Sin zona</span>`;
  } else {
    body+=`<div class="lc-warn">Sin zona ni datos de vendedores cargados.</div>`;
  }

  // WhatsApp share text
  const dia = zone?zone.dia:nr?nr.dia:'—';
  const vendedor = zone?zone.vendedor_nombre:nr?nr.vendedor_nombre:'—';
  const zonaNombre = zone?zone.nombre:'Sin zona definida';
  const wappText = encodeURIComponent(
    `📍 *Ubicación actual*
`+
    `Zona: ${zonaNombre}
`+
    `Vendedor: ${vendedor}
`+
    `Día de visita: ${dia}
`+
    `Coords: ${lat.toFixed(6)}, ${lng.toFixed(6)}
`+
    `Maps: https://maps.google.com/?q=${lat},${lng}`
  );

  body+=`<div class="lc-actions">
    <button class="btn-wapp" onclick="window.open('https://wa.me/?text=${wappText}','_blank')">WhatsApp 📤</button>
    <button class="btn-center" onclick="map.setView([${lat},${lng}],17)">Centrar mapa</button>
  </div>`;

  document.getElementById('lc-body').innerHTML=body;
  document.getElementById('loc-card').classList.add('show');

  // Watch for movement
  if(locWatchId) navigator.geolocation.clearWatch(locWatchId);
  locWatchId=navigator.geolocation.watchPosition(p=>{
    if(locMarker) locMarker.setLatLng([p.coords.latitude,p.coords.longitude]);
  },{enableHighAccuracy:true});
}

// Auto-request on load after data is ready
function tryAutoLocation(){
  if(navigator.geolocation && navigator.permissions){
    navigator.permissions.query({name:'geolocation'}).then(r=>{
      if(r.state==='granted') requestLocation();
    });
  }
}


// ── MOBILE PANEL ──────────────────────────────────────────────────────────────
function isMobile(){ return window.innerWidth <= 768; }

document.getElementById('panel-fab').onclick = openPanel;
document.getElementById('panel-backdrop').onclick = closePanel;

// Swipe down to close panel
let touchStartY=0, touchStartScrollTop=0;
const panelEl = document.getElementById('panel');
const scrollEl = document.getElementById('panel-scroll');

panelEl.addEventListener('touchstart',e=>{
  touchStartY = e.touches[0].clientY;
  touchStartScrollTop = scrollEl.scrollTop;
},{passive:true});

panelEl.addEventListener('touchmove',e=>{
  const dy = e.touches[0].clientY - touchStartY;
  // Only close if scrolled to top AND swiping down
  if(dy > 80 && scrollEl.scrollTop <= 0) closePanel();
},{passive:true});

// Close with Escape key
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePanel(); });

function openPanel(){
  panelEl.classList.add('open');
  document.getElementById('panel-backdrop').classList.add('show');
  // Update FAB icon
  document.getElementById('panel-fab').textContent='✕';
}
function closePanel(){
  panelEl.classList.remove('open');
  document.getElementById('panel-backdrop').classList.remove('show');
  document.getElementById('panel-fab').textContent='☰';
}

// Auto-close panel when vendor tapped on mobile
const _origVcardClick = function(vid){
  if(isMobile()) setTimeout(closePanel, 300);
};



// ── NEARBY POINTS ─────────────────────────────────────────────────────────────
let nearbyLayer = null;

function showNearbyPoints(lat, lng, radiusKm=0.8){
  if(!allPoints.length) return;

  // Remove previous nearby layer
  if(nearbyLayer){ map.removeLayer(nearbyLayer); nearbyLayer=null; }

  // Find points within radius
  const nearby = allPoints.filter(p=>{
    const dlat=p.lat-lat, dlng=p.lng-lng;
    const km = Math.sqrt(dlat*dlat + dlng*dlng)*111;
    p._distKm = Math.round(km*100)/100;
    return km <= radiusKm;
  }).sort((a,b)=>a._distKm-b._distKm);

  if(!nearby.length) return;

  nearbyLayer = L.layerGroup().addTo(map);

  nearby.forEach(p=>{
    const color = vendorColors[p.vendedor_id]||'#aaa';
    const icon = L.divIcon({
      className:'',
      html:`<div style="position:relative">
        <div style="width:13px;height:13px;border-radius:50%;background:${color};border:2.5px solid #fff;box-shadow:0 0 6px ${color},0 2px 6px rgba(0,0,0,.5)"></div>
      </div>`,
      iconSize:[13,13], iconAnchor:[6.5,6.5], popupAnchor:[0,-8]
    });
    const m = L.marker([p.lat,p.lng],{icon});
    const cname = p.cliente_nombre||p.cliente_id||'';
    const cid = p.cliente_id||'';
    const clienteInfo = (cid&&p.cliente_nombre) ? `N° ${cid} — ${p.cliente_nombre}` : cname;
    const wt = encodeURIComponent(`📍 *${p.cliente_nombre||'Cliente'}*
`+
      (cid?`N° Cliente: ${cid}
`:'')+
      (p.cliente_nombre?`Nombre: ${p.cliente_nombre}
`:'')+
      `Vendedor: ${p.vendedor_nombre}
Día: ${p.dia||'—'}
Distancia: ${p._distKm} km
Maps: https://maps.google.com/?q=${p.lat},${p.lng}`);
    m.bindPopup(`
      <div style="min-width:180px">
        <p style="font-weight:700;font-size:13px;margin-bottom:2px">${p.cliente_nombre||cid}</p>
        ${cid&&p.cliente_nombre?`<p style="font-size:10px;color:#999;margin-bottom:5px">N° ${cid}</p>`:'<div style="margin-bottom:5px"></div>'}
        <div style="background:#f5f5f5;border-radius:7px;padding:6px 9px;margin-bottom:8px">
          <p style="font-size:12px;font-weight:600;color:#333">👤 ${p.vendedor_nombre}</p>
          ${p.dia?`<p style="font-size:11px;color:#555;margin-top:2px">📅 ${p.dia}</p>`:''}
          <p style="font-size:11px;color:#888;margin-top:2px">📏 ${p._distKm} km</p>
        </div>
        <a href="https://wa.me/?text=${wt}" target="_blank"
          style="display:block;text-align:center;background:#25D366;color:#fff;padding:7px;border-radius:7px;font-size:12px;font-weight:600;text-decoration:none">
          WhatsApp 📤
        </a>
      </div>
    `,{maxWidth:220});
    nearbyLayer.addLayer(m);
  });

  // Draw radius circle
  L.circle([lat,lng],{
    radius: radiusKm*1000,
    color:'#e8304a', fillColor:'#e8304a',
    fillOpacity:.05, weight:1.5, dashArray:'5'
  }).addTo(nearbyLayer);

  showToast(`${nearby.length} puntos cercanos encontrados`,true);
}
